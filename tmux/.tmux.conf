# Theme first
source-file ~/.dotfiles/tmux/tokyonight_moon.tmux

# Better scrollback
set -g history-limit 100000
set -g mouse on
set -sg escape-time 10
set -g remain-on-exit on

# Easy reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Pane movement / splits
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shortcuts
bind / copy-mode \; send -X search-forward

# Mnemonic bindings
bind-key -N "detach" D detach-client
bind-key -N "kill session" Q confirm-before -p "Kill session #S? (y/n)" kill-session
bind-key -N "new window" C new-window
bind-key -N "split horizontally" H split-window -h
bind-key -N "split vertically" V split-window -v

set -g status-position bottom
set -g status-left-length 20
set -g status-right-length 160
set -g status-interval 1

# Put the hint text in user options so tmux doesn't parse commas inside the conditional
set -g @prefix_hints '#[fg=#ffc777,bg=#1e2030,bold] D #[fg=#82aaff,bg=#1e2030]detach  #[fg=#ffc777,bg=#1e2030,bold]Q #[fg=#82aaff,bg=#1e2030]quit  #[fg=#ffc777,bg=#1e2030,bold]C #[fg=#82aaff,bg=#1e2030]new  #[fg=#ffc777,bg=#1e2030,bold]H #[fg=#82aaff,bg=#1e2030]split-h  #[fg=#ffc777,bg=#1e2030,bold]V #[fg=#82aaff,bg=#1e2030]split-v  #[fg=#ffc777,bg=#1e2030,bold]/ #[fg=#82aaff,bg=#1e2030]search  '
set -g @mode_hints '#[fg=#82aaff,bg=#1e2030] #{pane_mode} '

set -g status-right '#{?client_prefix,#{@prefix_hints},}#{?pane_in_mode,#{@mode_hints},}#[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261] %Y-%m-%d  %H:%M #[fg=#82aaff,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1b1d2b,bg=#82aaff,bold] #h '

# Set tmux colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
